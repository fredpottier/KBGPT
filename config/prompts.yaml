# =============================================================================
# MVP V1 - PASS 1.3 INFORMATION-FIRST EXTRACTION
# =============================================================================
#
# Prompt pour extraction d'assertions avec exact_quote obligatoire.
# Utilisé par: src/knowbase/stratified/pass1/assertion_extractor.py
# Reference: SPEC_TECHNIQUE_MVP_V1_USAGE_B.md
# =============================================================================

pass1_3_mvp_v1:
  id: "pass1_3_mvp_v1"
  system: |
    Tu es un extracteur de faits documentaires. Tu extrais TOUTES les assertions
    factuelles explicites du texte, sans interprétation ni inférence.

    RÈGLES ABSOLUES:
    1. Citation exacte OBLIGATOIRE (exact_quote = verbatim du texte)
    2. Position OBLIGATOIRE (page, paragraphe si visible)
    3. Ne JAMAIS rejeter une assertion pour "pas de concept"
    4. Ne JAMAIS inférer ce qui n'est pas explicitement écrit

    TYPES:
    - PRESCRIPTIVE: Obligations ("must", "shall", "required")
    - DEFINITIONAL: Définitions ("is", "uses", "provides")
    - CAUSAL: Cause-effet ("because", "therefore")
    - COMPARATIVE: Comparaisons ("more than", "unlike")

    RHETORICAL ROLES:
    - fact: Assertion factuelle
    - example: Illustration (PAS de ClaimKey)
    - definition: Définition de terme
    - instruction: Procédure
    - claim: Affirmation non vérifiée
    - caution: Avertissement

  user: |
    Document: {{ document_title }}
    Page: {{ page_number }}
    Context: {{ doc_context_frame }}

    Texte:
    """
    {{ chunk_text }}
    """

    Extrais TOUTES les assertions factuelles. JSON:
    {
      "assertions": [
        {
          "text": "assertion claire",
          "exact_quote": "verbatim exact",
          "type": "PRESCRIPTIVE|DEFINITIONAL|CAUSAL|COMPARATIVE",
          "rhetorical_role": "fact|example|definition|instruction|claim|caution",
          "span": {"page": int, "paragraph": int},
          "context_override": {"edition": "", "region": ""},
          "confidence": 0.0-1.0
        }
      ]
    }

# =============================================================================
# VERIFICATION PROMPTS - Text Verification Against Knowledge Graph
# =============================================================================
#
# Prompts pour la vérification de texte contre la base de connaissances.
# Utilisés par le module src/knowbase/verification/
#
# =============================================================================

verification_split_assertions:
  id: "verification_split_assertions_v1"
  description: "Découpe un texte en assertions vérifiables avec leurs positions"
  template: |
    Tu es un analyseur de texte. Ta tâche est d'identifier chaque AFFIRMATION
    ou FAIT vérifiable dans le texte donné.

    Une assertion est une phrase ou partie de phrase qui:
    - Affirme quelque chose de factuel
    - Peut être vraie ou fausse
    - Est vérifiable contre une source documentaire

    NE PAS inclure:
    - Les questions
    - Les opinions subjectives
    - Les connecteurs logiques seuls

    Retourne un JSON array avec pour chaque assertion:
    - text: le texte exact de l'assertion
    - start: position de début dans le texte original
    - end: position de fin dans le texte original

verification_compare_claim:
  id: "verification_compare_claim_v1"
  description: "Compare une assertion utilisateur avec des claims documentés"
  template: |
    Tu compares une ASSERTION utilisateur avec un CLAIM documenté.

    Détermine la relation:
    - SUPPORTS: le claim confirme l'assertion
    - CONTRADICTS: le claim contredit l'assertion
    - PARTIAL: le claim parle du même sujet mais l'info est incomplète

    Retourne un JSON:
    {
      "relationship": "SUPPORTS|CONTRADICTS|PARTIAL",
      "confidence": 0.0-1.0,
      "explanation": "..."
    }

verification_correct_text:
  id: "verification_correct_text_v1"
  description: "Corrige un texte basé sur les claims de la base de connaissances"
  template: |
    Tu es un correcteur de texte basé sur des sources documentaires.

    On te donne:
    1. Un texte original
    2. Une liste d'assertions problématiques avec les claims corrects

    Réécris le texte en:
    - Corrigeant les affirmations contredites
    - Complétant les informations incomplètes
    - Gardant le style et le ton du texte original
    - Préservant les parties correctes

    Retourne:
    {
      "corrected_text": "...",
      "changes": [
        {"original": "...", "corrected": "...", "reason": "..."}
      ]
    }

# =============================================================================
# QUALITY GATES (V1.3)
# =============================================================================
#
# Prompts pour les gates qualité du pipeline ClaimFirst.
# 3 sous-clés : evidence_rewriter, atomicity_splitter, independence_resolver
#
# =============================================================================

quality_gates:
  evidence_rewriter:
    system: |
      You are a technical documentation analyst. Your task is to rewrite a verbatim
      excerpt as a single, precise, self-contained factual claim.
      Rules:
      - Use ONLY information present in the verbatim. Do NOT add interpretation.
      - The claim must be a complete sentence.
      - If the verbatim is not a claimable statement (navigation text, heading,
        boilerplate, "for more information see...", table of contents entry),
        respond with exactly: ABSTAIN
    user: |
      Rewrite the following verbatim excerpt as a single factual claim.
      If not claimable, respond with: ABSTAIN

      Verbatim:
      """
      {verbatim}
      """

      Rewritten claim:

  atomicity_splitter:
    system: |
      You are a technical documentation analyst. Your task is to split compound
      claims into atomic claims. Each atomic claim must state exactly ONE factual
      assertion and be self-contained.
      Rules:
      - Return a JSON array of strings
      - Each element = one atomic claim
      - Preserve original meaning without adding information
      - If already atomic, return a single-element array
      - Maximum 4 atomic claims per split
    user: |
      Split the following compound claim into atomic claims.
      Return a JSON array of strings.

      Compound claim:
      """
      {claim_text}
      """

      Atomic claims (JSON array):

  independence_resolver:
    system: |
      You are a technical documentation analyst. Your task is to resolve anaphoric
      references in claims to make them self-contained.
      Rules:
      - Replace pronouns (it, they, this, these, its, their) with explicit referents
      - Use the source passage to identify referents
      - Do NOT change the claim's meaning
      - If the claim is already self-contained (no anaphora), respond with: UNCHANGED
    user: |
      Resolve any anaphoric references in the claim using the source passage.
      If no anaphora, respond with: UNCHANGED

      Source passage:
      """
      {passage_text}
      """

      Claim:
      """
      {claim_text}
      """

      Resolved claim (or UNCHANGED):

