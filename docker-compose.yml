x-common-config: &common-config
  stop_grace_period: 10s
  # Rotation Docker json-file (incident 2026-04-27 — eviter perte de logs au recreate).
  # 20 MB max par fichier, 10 fichiers archives = 200 MB par container.
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "10"

services:
  # NOTE: qdrant et redis sont definis dans docker-compose.infra.yml (source unique).
  # Les definir ici aussi causait un merge additif des ports (qui ouvrait Redis a la fois
  # sur 127.0.0.1 ET 0.0.0.0, contournant le binding loopback de l'incident 2026-04-27).
  # Lais leurs definitions dans infra.yml — yml ne fait que les referencer en depends_on.

  app:
    <<: *common-config
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: sap-kb-app:latest
    container_name: knowbase-app
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    shm_size: '2gb'  # Nécessaire pour OnnxTR/PyTorch (défaut 64MB insuffisant)
    # CH-35.A4 — accès GPU pour cross-encoder rerank (BAAI/bge-reranker-v2-m3)
    # GPU partagé avec worker (ingestion). Acceptable car query rerank ~50ms,
    # ingestion bursty et pas concurrente avec query.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      TZ: Europe/Paris  # Timezone Paris pour tous les logs
      PYTHONPATH: /app:/app/src
      HF_HOME: /data/models
      ONNXTR_CACHE_DIR: /data/models/onnxtr  # Persister cache OnnxTR (sinon re-download à chaque restart)
      KNOWBASE_DATA_DIR: /data
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      BURST_MAX_CONCURRENT_DOCS: "2"  # 2 docs en parallèle (augmenté sur demande)
      SERVICE_NAME: app  # Pour logs persistants /app/logs/app/app.log
      LOGS_DIR: /app/logs
      # CH-46 Phase A — optims latence V4 (env-only)
      # NOTE CH-48 (2026-05-09) : ces env vars Mistral-Small sont commentées pendant le
      # bake-off Together AI car Mistral-Small-3.2-24B n'est PAS dans le catalogue Together.
      # CH-48 (2026-05-09) — Bake-off Together AI serverless. Décision :
      # Mistral-Small-3.2-24B-2506 (DeepInfra hist.) NON dispo serverless Together.
      # Mistral-Small-24B-2501 listé mais NON-serverless réel.
      # Choix retenu : Llama-3.3-70B-Turbo PARTOUT (Analyzer + Structurer + Composer).
      # Justification :
      #  - Seul modèle viable serverless ET batch (-50%) dans la liste Together
      #  - 4/5 ANSWER smoke (meilleur des 3 testés Llama / Qwen3-235B / DeepSeek-V3.1)
      #  - Latence 19.7s mean smoke (cible Test Armand 30-40s atteinte)
      #  - Cohérence bench/prod (même modèle des 2 côtés) = critère #1 Fred
      #  - Biais auto-juge avec LLM-judge=Llama-3.3 jugé acceptable car tâches
      #    radicalement différentes (composer vs juger) + garde-fous structured
      #    metrics + sanity check Fred
      # Signal d'alarme historique : Levier 4 06/05 = "Llama-Turbo PIÈGE 129/132
      # abstentions" sur Structurer. À vérifier sur bench micro 30q de Phase 1.
      ANALYZER_MODEL: meta-llama/Llama-3.3-70B-Instruct-Turbo
      FACTS_FIRST_STRUCTURER_MODEL: meta-llama/Llama-3.3-70B-Instruct-Turbo
      # CH-47 — V4.1 Evidence-Grounded Reasoning (active path _answer_reasoning pour
      # types causal/comparison/temporal qui régressent fortement sur Robust)
      V4_REASONING_MODE_ENABLED: "true"
      REASONING_COMPOSER_MODEL: meta-llama/Llama-3.3-70B-Instruct-Turbo
      # CH-48 — Together AI serverless. Pour rollback : retirer TOGETHER_API_KEY de
      # .env + commenter ANALYZER_MODEL + FACTS_FIRST_STRUCTURER_MODEL → fallback
      # auto DeepInfra (Mistral-Small-3.2-24B + Qwen2.5-72B).
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      TOGETHER_RUNTIME_MODEL: meta-llama/Llama-3.3-70B-Instruct-Turbo
    ports:
      - "${APP_PORT}:8000"
      - "5678:5678"
    volumes:
      - ./app:/app
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
      - ./poc:/app/poc
      - ./benchmark:/app/benchmark  # Benchmark — resultats, questions, scripts (inclus dans les backups)
      - ./logs:/app/logs  # Logs persistants rotates (incident 2026-04-27)
      - /var/run/docker.sock:/var/run/docker.sock  # Domain Packs — lecture/écriture pour lancer les sidecars
    networks:
      - knowbase_net
    working_dir: /app
    command: python -Xfrozen_modules=off -m uvicorn main:app --host 0.0.0.0 --port 8000

  ingestion-worker:
    <<: *common-config
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: sap-kb-worker:latest
    container_name: knowbase-worker
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
    stop_grace_period: 15s
    shm_size: '2gb'  # Nécessaire pour OnnxTR/PyTorch (défaut 64MB insuffisant)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1  # Utiliser 1 GPU (Docker Desktop Windows ne supporte pas device_ids)
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      TZ: Europe/Paris  # Timezone Paris pour tous les logs
      PYTHONPATH: /app:/app/src
      HF_HOME: /data/models
      ONNXTR_CACHE_DIR: /data/models/onnxtr  # Persister cache OnnxTR
      KNOWBASE_DATA_DIR: /data
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      OSMOSIS_API_URL: http://app:8000
      # CH-39 — runtime version (v3 = refonte minimaliste, v2 = ancien)
      # CH-43 — bascule v4 Facts-First (Tranches 1-5 + leviers latence) — 2026-05-07
      RUNTIME_VERSION: v4
      # Judges centralises — switch d'Ollama vers llama.cpp self-hosted
      # (container prometheus-judge, GPU, stable vs Ollama timeout 14B)
      # CH-34 (04/05/2026) — bascule de Prometheus (sous-évaluait 90% des cas, +0.687 delta)
      # vers Llama-3.3-70B-Instruct sur DeepInfra (calibration honnête, distingue
      # abstention correcte vs hallucination). Audit benchmark/audit_judge_calibration_llama70b.json
      T2T5_JUDGE_PROVIDER: deepinfra
      T2T5_JUDGE_MODEL_NAME: meta-llama/Llama-3.3-70B-Instruct
      RAGAS_JUDGE_PROVIDER: deepinfra
      RAGAS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct
      ROBUSTNESS_JUDGE_PROVIDER: deepinfra
      ROBUSTNESS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct
      OSMOSIS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct  # used by robustness pour le label
      LLAMACPP_URL: http://prometheus-judge:8000
      OLLAMA_URL: http://host.docker.internal:11434  # fallback si besoin
      DEV_MODE: "false"  # Mode production: worker tourne en continu (10 jobs avant reload)

      # ========== CONFIGURATION TIMEOUT CENTRALISÉE ==========
      # 🎯 VARIABLE CENTRALE - Ajuster cette valeur unique pour contrôler tous les timeouts de pipeline
      # Durée maximale de traitement d'un document (en secondes)
      #
      # Recommandations selon complexité documents:
      #   - 3600s (1h)   → Documents standards (< 300 slides) ✅ DÉFAUT
      #   - 5400s (1h30) → Documents complexes (300-500 slides)
      #   - 7200s (2h)   → Documents très complexes (> 500 slides)
      #
      # Les timeouts ci-dessous sont calculés automatiquement:
      #   - INGESTION_JOB_TIMEOUT = MAX_DOCUMENT_PROCESSING_TIME * 1.5 (buffer RQ)
      #   - OSMOSE_TIMEOUT_SECONDS = MAX_DOCUMENT_PROCESSING_TIME
      MAX_DOCUMENT_PROCESSING_TIME: "3600"  # 1 heure (support jusqu'à ~45 min de processing)

      # Variables legacy (OPTIONNELLES - décommenter pour override manuel):
      # OSMOSE_TIMEOUT_SECONDS: "3600"      # Auto: MAX_DOCUMENT_PROCESSING_TIME
      # INGESTION_JOB_TIMEOUT: "5400"       # Auto: MAX_DOCUMENT_PROCESSING_TIME * 1.5

      CUDA_VISIBLE_DEVICES: "0"  # Exposer GPU comme device 0 dans le container (mapping de host device 1)
      SERVICE_NAME: worker  # Pour logs persistants /app/logs/worker/worker.log
      LOGS_DIR: /app/logs
      # CH-46 Phase A — optims latence V4 (cohérence avec service app)
      ANALYZER_MODEL: mistralai/Mistral-Small-3.2-24B-Instruct-2506
      FACTS_FIRST_STRUCTURER_MODEL: mistralai/Mistral-Small-3.2-24B-Instruct-2506
      # CH-46 — bench concurrency réduite pour éviter saturation DeepInfra publique
      # (default 3 → 2 calls Mistral simultanés × 5 LLM/q = 10 simultanés gérables)
      BENCHMARK_CONCURRENCY: "2"
    ports:
      - "5679:5679"  # Debug port for worker
    volumes:
      - ./app:/app
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
      - ./poc:/app/poc
      - ./benchmark:/app/benchmark
      - ./logs:/app/logs  # Logs persistants rotates (incident 2026-04-27)
      - /var/run/docker.sock:/var/run/docker.sock  # Domain Packs — lancer les sidecars NER
    networks:
      - knowbase_net
    working_dir: /app
    entrypoint: ["/app/entrypoint-worker.sh"]
    command: python -m knowbase.ingestion.queue

  ingestion-worker-2:
    <<: *common-config
    # Worker secondaire pour parallélisme V2 (option A — équivalent BURST_MAX_CONCURRENT_DOCS=2 sans EC2)
    # Réutilise l'image sap-kb-worker:latest du worker primaire.
    # Pas de réservation GPU (partage best-effort, fallback CPU si conflit).
    # Pas de port debug exposé (5679 déjà pris par worker primaire).
    image: sap-kb-worker:latest
    container_name: knowbase-worker-2
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
    stop_grace_period: 15s
    shm_size: '2gb'
    env_file:
      - .env
    environment:
      TZ: Europe/Paris
      PYTHONPATH: /app:/app/src
      HF_HOME: /data/models
      ONNXTR_CACHE_DIR: /data/models/onnxtr
      KNOWBASE_DATA_DIR: /data
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      OSMOSIS_API_URL: http://app:8000
      # CH-39 — runtime version (v3 = refonte minimaliste, v2 = ancien)
      # CH-43 — bascule v4 Facts-First (Tranches 1-5 + leviers latence) — 2026-05-07
      RUNTIME_VERSION: v4
      # CH-34 (04/05/2026) — bascule de Prometheus (sous-évaluait 90% des cas, +0.687 delta)
      # vers Llama-3.3-70B-Instruct sur DeepInfra (calibration honnête, distingue
      # abstention correcte vs hallucination). Audit benchmark/audit_judge_calibration_llama70b.json
      T2T5_JUDGE_PROVIDER: deepinfra
      T2T5_JUDGE_MODEL_NAME: meta-llama/Llama-3.3-70B-Instruct
      RAGAS_JUDGE_PROVIDER: deepinfra
      RAGAS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct
      ROBUSTNESS_JUDGE_PROVIDER: deepinfra
      ROBUSTNESS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct
      OSMOSIS_JUDGE_MODEL: meta-llama/Llama-3.3-70B-Instruct  # used by robustness pour le label
      LLAMACPP_URL: http://prometheus-judge:8000
      OLLAMA_URL: http://host.docker.internal:11434
      DEV_MODE: "false"
      MAX_DOCUMENT_PROCESSING_TIME: "3600"
      SERVICE_NAME: worker-2  # Pour logs persistants /app/logs/worker-2/worker-2.log
      LOGS_DIR: /app/logs
      # CH-46 Phase A — optims latence V4 (cohérence avec service app)
      ANALYZER_MODEL: mistralai/Mistral-Small-3.2-24B-Instruct-2506
      FACTS_FIRST_STRUCTURER_MODEL: mistralai/Mistral-Small-3.2-24B-Instruct-2506
    volumes:
      - ./app:/app
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
      - ./poc:/app/poc
      - ./benchmark:/app/benchmark
      - ./logs:/app/logs  # Logs persistants rotates (incident 2026-04-27)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - knowbase_net
    working_dir: /app
    entrypoint: ["/app/entrypoint-worker.sh"]
    command: python -m knowbase.ingestion.queue

  folder-watcher:
    <<: *common-config
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: sap-kb-watcher:latest
    container_name: knowbase-watcher
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      TZ: Europe/Paris
      PYTHONPATH: /app:/app/src
      KNOWBASE_DATA_DIR: /data
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - ./app:/app
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    networks:
      - knowbase_net
    working_dir: /app
    command: python -m knowbase.ingestion.folder_watcher
    restart: unless-stopped

  frontend:
    <<: *common-config
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: sap-kb-frontend:latest
    container_name: knowbase-frontend
    depends_on:
      - app
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      # API URLs - Client uses localhost, Server uses Docker service name
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_API_INTERNAL_URL=http://app:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
      - frontend_next_build:/app/.next  # Volume pour .next (evite problemes permissions)
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/warmup.js:/app/warmup.js
    command: npm run dev
    networks:
      - knowbase_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ngrok: # DÉSACTIVÉ - Nécessite plan payant pour custom subdomain
  #   image: ngrok/ngrok:latest
  #   container_name: knowbase-ngrok
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   volumes:
  #     - ./ngrok.yml:/etc/ngrok.yml
  #     - ./data/logs:/logs
  #     - ./src:/app/src
  #   env_file:
  #     - .env
  #   command: start --config /etc/ngrok.yml --all
  #   networks:
  #     - knowbase_net

  # LLM Judge self-hosted via llama.cpp server
  # Heberge M-Prometheus-14B (GGUF Q4_K_M) sur GPU local pour RAGAS.
  # Remplace Ollama (timeouts frequents) par llama.cpp natif (plus stable).
  # Port 8002 interne, 8082 exterieur.
  prometheus-judge:
    <<: *common-config
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: knowbase-prometheus-judge
    restart: unless-stopped
    ports:
      - "8082:8000"
    volumes:
      - ./data/models/prometheus:/models
    environment:
      - LLAMA_ARG_MODEL=/models/M-Prometheus-14B.i1-Q4_K_M.gguf
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      - LLAMA_ARG_N_GPU_LAYERS=99
      - LLAMA_ARG_CTX_SIZE=8192
      - LLAMA_ARG_THREADS=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - knowbase_net

networks:
  knowbase_net:
    name: knowbase_network
    driver: bridge

volumes:
  qdrant_data:
    name: knowbase_qdrant_data  # Doit matcher docker-compose.infra.yml
  redis_data:
    name: knowbase_redis_data   # Doit matcher docker-compose.infra.yml
  frontend_node_modules:
    name: knowbase_frontend_node_modules
  frontend_next_build:
    name: knowbase_frontend_next_build

